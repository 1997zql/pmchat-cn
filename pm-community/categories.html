<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类广场 - PM社区</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo"><i class="fas fa-layer-group"></i><span>PM社区</span></a>
            <nav class="main-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-home"></i>首页</a>
                <a href="categories.html" class="nav-item active"><i class="fas fa-th-large"></i>分类</a>
                <a href="chat.html" class="nav-item"><i class="fas fa-comments"></i>闲聊</a>
                <a href="tools.html" class="nav-item"><i class="fas fa-tools"></i>工具箱</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="搜索..."></div>
            <button class="btn btn-primary" onclick="location.href='create.html'"><i class="fas fa-plus"></i>发布</button>
            <div class="user-menu">
                <div class="notification-badge"><i class="fas fa-bell"></i><span class="badge">3</span></div>
                <div class="avatar" onclick="location.href='profile.html'"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt=""></div>
            </div>
        </div>
    </header>

    <main class="main-container no-sidebar">
        <div class="page-header">
            <h1><i class="fas fa-folder-open" style="color: var(--primary); margin-right: 12px;"></i>分类广场</h1>
            <p>探索不同领域的产品经理内容，找到你感兴趣的专题</p>
        </div>

        <div class="category-nav">
            <button class="category-nav-item active">全部</button>
            <button class="category-nav-item">C端产品</button>
            <button class="category-nav-item">B端产品</button>
            <button class="category-nav-item">AI/大数据</button>
            <button class="category-nav-item">用户增长</button>
            <button class="category-nav-item">策略产品</button>
            <button class="category-nav-item">产品运营</button>
        </div>

        <div class="filter-bar">
            <div class="filter-tabs">
                <button class="filter-tab active">全部</button>
                <button class="filter-tab">文章</button>
                <button class="filter-tab">问答</button>
                <button class="filter-tab">讨论</button>
            </div>
            <select class="sort-select">
                <option>最新优先</option>
                <option>最热优先</option>
            </select>
        </div>

        <article class="post-card" onclick="location.href='detail.html'">
            <div class="post-header">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alice" alt="" class="author-avatar">
                <div class="author-info"><span class="author-name">李明轩</span><span class="post-meta">C端产品经理 · 2小时前</span></div>
                <span class="category-badge badge-design">C端产品</span>
            </div>
            <h2 class="post-title">如何通过用户分层提升产品留存率</h2>
            <p class="post-excerpt">用户分层是精细化运营的基础，通过RFM模型和用户生命周期模型进行分层...</p>
            <div class="post-footer">
                <div class="post-actions">
                    <button class="action-btn like-btn" onclick="event.stopPropagation();toggleLike(this)"><i class="far fa-thumbs-up"></i> 89</button>
                    <button class="action-btn"><i class="far fa-comment"></i> 23</button>
                </div>
            </div>
        </article>

        <article class="post-card" onclick="location.href='detail.html'">
            <div class="post-header">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bob" alt="" class="author-avatar">
                <div class="author-info"><span class="author-name">王雨晴</span><span class="post-meta">B端产品专家 · 3小时前</span></div>
                <span class="category-badge badge-b">B端产品</span>
            </div>
            <h2 class="post-title">B端SaaS产品定价策略设计指南</h2>
            <p class="post-excerpt">SaaS产品的定价是决定商业模式成败的关键因素...</p>
            <div class="post-footer">
                <div class="post-actions">
                    <button class="action-btn like-btn" onclick="event.stopPropagation();toggleLike(this)"><i class="far fa-thumbs-up"></i> 156</button>
                    <button class="action-btn"><i class="far fa-comment"></i> 45</button>
                </div>
            </div>
        </article>

        <div class="question-card" onclick="location.href='detail.html'">
            <div class="question-header">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emma" alt="" class="author-avatar">
                <div class="author-info"><span class="author-name">林晓琳</span><span class="post-meta">求职中 · 1小时前</span></div>
                <span class="question-status pending">待回答</span>
            </div>
            <h2 class="post-title">面试时被问到「你最大的缺点是什么」该怎么回答？</h2>
            <p class="post-excerpt">马上要面试产品经理岗位了，有什么比较好的回答思路吗？</p>
            <div class="question-stats">
                <span class="question-stat"><i class="far fa-thumbs-up"></i> 12</span>
                <span class="question-stat"><i class="far fa-comment"></i> 8 个回答</span>
            </div>
        </div>

        <div style="text-align: center; padding: 40px;">
            <button class="btn btn-secondary"><i class="fas fa-arrow-down"></i> 加载更多</button>
        </div>
    </main>

    <div class="toast success" id="toast" style="display:none;">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">操作成功</span>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
