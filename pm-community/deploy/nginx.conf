# PMChat 标准 Nginx 配置
# 生产建议路径：/etc/nginx/sites-available/pmchat

server {
    listen 80;
    listen [::]:80;
    server_name pmchat.cn www.pmchat.cn;

    root /var/www/pmchat;
    index index.html;

    access_log /var/log/nginx/pmchat.access.log;
    error_log /var/log/nginx/pmchat.error.log;

    location /.well-known/acme-challenge/ {
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf|bak)$ {
        deny all;
    }

    autoindex off;
    client_max_body_size 10M;
}
