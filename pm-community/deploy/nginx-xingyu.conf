# ============================================
# PM社区 Nginx 配置文件
# 域名: xingyu.click
# ============================================

server {
    listen 80;
    server_name xingyu.click;

    # HTTP 自动跳转到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xingyu.click;

    # SSL 证书路径（Let's Encrypt 自动配置后自动填充）
    ssl_certificate /etc/letsencrypt/live/xingyu.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xingyu.click/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 网站根目录
    root /var/www/pm-community;
    index index.html;

    # 访问日志
    access_log /var/log/nginx/pm-community.access.log;
    error_log /var/log/nginx/pm-community.error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/atom+xml image/svg+xml;

    # 默认路由 - 所有路径返回 index.html（SPA 支持）
    location / {
        try_files $uri $uri/ /index.html;

        # 缓存控制
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 静态资源缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问敏感文件
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf|bak)$ {
        deny all;
    }

    # 安全：禁用目录浏览
    autoindex off;

    # 最大上传文件大小
    client_max_body_size 10M;
}
