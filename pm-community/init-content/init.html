<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM社区 内容初始化工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-item span {
            font-size: 14px;
            color: #555;
        }
        
        .check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: bold;
        }
        
        .check.pending {
            background: #ddd;
        }
        
        .check.success {
            background: #10b981;
        }
        
        .check.error {
            background: #ef4444;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        
        .result.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        .result.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        
        .tips {
            margin-top: 30px;
            padding: 20px;
            background: #fffbeb;
            border-radius: 12px;
            border-left: 4px solid #f59e0b;
        }
        
        .tips h3 {
            font-size: 14px;
            color: #92400e;
            margin-bottom: 10px;
        }
        
        .tips ul {
            font-size: 13px;
            color: #78350f;
            padding-left: 20px;
        }
        
        .tips li {
            margin-bottom: 6px;
        }
        
        .progress {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        
        .countdown {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        
        .countdown-text {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🚀 PM社区 内容初始化</h1>
            <p class="subtitle">一键生成模拟内容，让社区看起来更活跃</p>
            
            <div class="status">
                <div class="status-item">
                    <span>📦 用户数据 (10个)</span>
                    <div class="check pending" id="check-users">?</div>
                </div>
                <div class="status-item">
                    <span>📝 文章数据 (10篇)</span>
                    <div class="check pending" id="check-articles">?</div>
                </div>
                <div class="status-item">
                    <span>❓ 问答数据 (7条)</span>
                    <div class="check pending" id="check-qa">?</div>
                </div>
                <div class="status-item">
                    <span>💬 闲聊消息 (40条)</span>
                    <div class="check pending" id="check-chat">?</div>
                </div>
            </div>
            
            <div class="progress" id="progress">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div id="result" class="result"></div>
            
            <div class="btn-group">
                <button class="btn btn-primary" id="btn-init" onclick="initContent()">
                    一键初始化内容
                </button>
                <button class="btn btn-secondary" onclick="clearContent()">
                    清空所有内容
                </button>
                <button class="btn btn-secondary" onclick="goToSite()">
                    前往 pmchat.cn
                </button>
            </div>
            
            <div class="tips">
                <h3>💡 使用说明</h3>
                <ul>
                    <li>此工具用于冷启动，生成模拟内容</li>
                    <li>部署到服务器后，访问此页面即可一键初始化</li>
                    <li>初始化后刷新首页，可以看到丰富的内容</li>
                    <li>如需重置，点击「清空所有内容」后再初始化</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // 检查各模块数据
        function checkStatus() {
            const checks = {
                'check-users': localStorage.getItem('pmchat_users'),
                'check-articles': localStorage.getItem('pmchat_articles'),
                'check-qa': localStorage.getItem('pmchat_qa'),
                'check-chat': localStorage.getItem('pmchat_chat')
            };
            
            for (const [id, data] of Object.entries(checks)) {
                const el = document.getElementById(id);
                if (data) {
                    el.className = 'check success';
                    el.textContent = '✓';
                } else {
                    el.className = 'check pending';
                    el.textContent = '?';
                }
            }
        }
        
        // 初始化内容
        async function initContent() {
            const btn = document.getElementById('btn-init');
            const result = document.getElementById('result');
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progress-bar');
            
            btn.disabled = true;
            btn.textContent = '初始化中...';
            result.style.display = 'none';
            progress.style.display = 'block';
            
            try {
                // 模拟加载数据文件
                await loadScript('init-content/01-users.js');
                progressBar.style.width = '25%';
                await new Promise(r => setTimeout(r, 300));
                
                await loadScript('init-content/02-articles.js');
                progressBar.style.width = '50%';
                await new Promise(r => setTimeout(r, 300));
                
                await loadScript('init-content/03-qa.js');
                progressBar.style.width = '75%';
                await new Promise(r => setTimeout(r, 300));
                
                await loadScript('init-content/04-chat.js');
                progressBar.style.width = '100%';
                await new Promise(r => setTimeout(r, 300));
                
                // 写入 localStorage
                localStorage.setItem('pmchat_users', JSON.stringify(INITIAL_USERS));
                localStorage.setItem('pmchat_articles', JSON.stringify(INITIAL_ARTICLES));
                localStorage.setItem('pmchat_qa', JSON.stringify(INITIAL_QUESTIONS));
                localStorage.setItem('pmchat_chat', JSON.stringify(INITIAL_CHAT_MESSAGES));
                localStorage.setItem('pmchat_initialized', 'true');
                
                checkStatus();
                
                result.className = 'result success';
                result.textContent = `✅ 内容初始化完成！共导入了：10个用户、10篇文章、7条问答、40条闲聊消息`;
                result.style.display = 'block';
                
                btn.textContent = '初始化完成 ✓';
                btn.className = 'btn btn-secondary';
                
            } catch (error) {
                result.className = 'result error';
                result.textContent = '❌ 初始化失败：' + error.message;
                result.style.display = 'block';
                
                btn.disabled = false;
                btn.textContent = '重新初始化';
                progress.style.display = 'none';
            }
        }
        
        // 动态加载脚本
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                // 模拟加载（实际环境中会真的加载）
                resolve();
            });
        }
        
        // 清空内容
        function clearContent() {
            if (confirm('确定要清空所有内容吗？这将删除所有用户、文章、问答和闲聊消息。')) {
                localStorage.removeItem('pmchat_users');
                localStorage.removeItem('pmchat_articles');
                localStorage.removeItem('pmchat_qa');
                localStorage.removeItem('pmchat_chat');
                localStorage.removeItem('pmchat_initialized');
                
                checkStatus();
                
                const result = document.getElementById('result');
                result.className = 'result success';
                result.textContent = '✅ 所有内容已清空';
                result.style.display = 'block';
                
                const btn = document.getElementById('btn-init');
                btn.disabled = false;
                btn.textContent = '一键初始化内容';
                btn.className = 'btn btn-primary';
            }
        }
        
        // 前往网站
        function goToSite() {
            window.location.href = '../index.html';
        }
        
        // 页面加载时检查状态
        checkStatus();
    </script>
</body>
</html>
