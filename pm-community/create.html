<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作中心 - PM社区</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo"><i class="fas fa-layer-group"></i><span>PM社区</span></a>
            <nav class="main-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-home"></i>首页</a>
                <a href="categories.html" class="nav-item"><i class="fas fa-th-large"></i>分类</a>
                <a href="chat.html" class="nav-item"><i class="fas fa-comments"></i>闲聊</a>
                <a href="tools.html" class="nav-item"><i class="fas fa-tools"></i>工具箱</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="btn btn-secondary" onclick="location.href='index.html'">取消</button>
            <button class="btn btn-primary" onclick="handlePublish()"><i class="fas fa-paper-plane"></i>发布</button>
        </div>
    </header>

    <main class="main-container no-sidebar" style="margin-top: 88px;">
        <div class="editor-container">
            <!-- 创作类型选择 -->
            <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                <button class="btn btn-primary" id="typeArticle" onclick="selectType('article')">
                    <i class="fas fa-newspaper"></i> 写文章
                </button>
                <button class="btn btn-secondary" id="typeQuestion" onclick="selectType('question')">
                    <i class="fas fa-question-circle"></i> 提问题
                </button>
                <button class="btn btn-secondary" id="typeDiscussion" onclick="selectType('discussion')">
                    <i class="fas fa-comment-dots"></i> 发讨论
                </button>
            </div>

            <!-- 标题 -->
            <div class="form-group">
                <input type="text" placeholder="标题" id="postTitle" style="font-size: 20px; font-weight: 600; padding: 16px; border: none; border-bottom: 1px solid var(--border); border-radius: 0;">
            </div>

            <!-- 富文本编辑器 -->
            <div class="editor-toolbar">
                <button class="toolbar-btn" title="加粗"><i class="fas fa-bold"></i></button>
                <button class="toolbar-btn" title="斜体"><i class="fas fa-italic"></i></button>
                <button class="toolbar-btn" title="下划线"><i class="fas fa-underline"></i></button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" title="H1"><i class="fas fa-heading"></i>1</button>
                <button class="toolbar-btn" title="H2"><i class="fas fa-heading"></i>2</button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" title="有序列表"><i class="fas fa-list-ol"></i></button>
                <button class="toolbar-btn" title="无序列表"><i class="fas fa-list-ul"></i></button>
                <button class="toolbar-btn" title="引用"><i class="fas fa-quote-right"></i></button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" title="代码"><i class="fas fa-code"></i></button>
                <button class="toolbar-btn" title="链接"><i class="fas fa-link"></i></button>
                <button class="toolbar-btn" title="图片"><i class="fas fa-image"></i></button>
                <button class="toolbar-btn" title="表格"><i class="fas fa-table"></i></button>
            </div>
            <div class="editor-content" contenteditable="true" id="editorContent" style="min-height: 400px;">
                <p style="color: var(--text-tertiary);">开始创作你的内容...</p>
            </div>

            <!-- 分类和标签 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label><i class="fas fa-folder"></i> 选择分类</label>
                    <select id="categorySelect">
                        <option value="">请选择分类</option>
                        <option value="c">C端产品</option>
                        <option value="b">B端产品</option>
                        <option value="ai">AI/大数据</option>
                        <option value="growth">用户增长</option>
                        <option value="strategy">策略产品</option>
                        <option value="operation">产品运营</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label><i class="fas fa-tags"></i> 添加标签</label>
                    <input type="text" placeholder="输入标签，按回车添加" id="tagInput">
                </div>
            </div>

            <!-- 标签显示 -->
            <div style="margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;" id="tagContainer">
                <span class="mini-tag" style="cursor: pointer;" onclick="this.remove()">#产品设计 <i class="fas fa-times"></i></span>
                <span class="mini-tag" style="cursor: pointer;" onclick="this.remove()">#用户体验 <i class="fas fa-times"></i></span>
            </div>

            <!-- 封面图 -->
            <div class="form-group" style="margin-top: 20px;">
                <label><i class="fas fa-image"></i> 封面图片（可选）</label>
                <div style="border: 2px dashed var(--border); border-radius: var(--radius-md); padding: 40px; text-align: center; cursor: pointer; transition: var(--transition);" onclick="showToast('封面上传功能即将开放', 'info')">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: var(--text-tertiary); margin-bottom: 16px;"></i>
                    <p style="color: var(--text-secondary);">点击或拖拽上传封面图片</p>
                    <p style="color: var(--text-tertiary); font-size: 13px;">建议尺寸 800x450，支持 JPG、PNG</p>
                </div>
            </div>

            <!-- 发布选项 -->
            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <span style="font-weight: 500;">可见性:</span>
                    <label class="checkbox" style="display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="visibility" value="public" checked style="width: auto;">
                        <span><i class="fas fa-globe"></i> 公开</span>
                    </label>
                    <label class="checkbox" style="display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="visibility" value="fans" style="width: auto;">
                        <span><i class="fas fa-lock"></i> 仅粉丝</span>
                    </label>
                    <label class="checkbox" style="display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="visibility" value="private" style="width: auto;">
                        <span><i class="fas fa-user"></i> 仅自己</span>
                    </label>
                </div>
            </div>
        </div>
    </main>

    <div class="toast success" id="toast" style="display:none;"><i class="fas fa-check-circle"></i><span id="toastMessage">操作成功</span></div>
    <script src="js/app.js"></script>
    <script>
        function handlePublish() {
            publishCurrentPost();
        }

        document.getElementById('editorContent').addEventListener('focus', function() {
            if (this.innerHTML === '<p style="color: var(--text-tertiary);">开始创作你的内容...</p>') {
                this.innerHTML = '<p></p>';
            }
        });
    </script>
</body>
</html>
