services:
  postgres:
    image: postgres:16
    container_name: pmchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmchat}
      POSTGRES_USER: ${POSTGRES_USER:-pmchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmchat123}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pmchat-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: pmchat-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-pmchat_master_key}
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: pmchat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-pmchatminio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-pmchatminio123}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
